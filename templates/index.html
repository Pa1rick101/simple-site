<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #f5efe6, #dce8f2);
        color: #1f2933;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        padding: 3rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.15);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2.5rem, 6vw, 4rem);
      }

      p {
        margin: 0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, world!</h1>
      <p>This Flask test site is up and running.</p>
    </main>
  </body>
</html>
